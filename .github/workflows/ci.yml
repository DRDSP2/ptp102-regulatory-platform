name: CI/CD — PTP-102 Regulatory Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  SUPABASE_PROJECT_REF: 'vtxrmjuftqtealzymqbk'
  FOUR_EVERLAND_PROJECT_ID: '6a2abe9085252f000741a1de'

jobs:
  lint-and-test:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npm run typecheck
        continue-on-error: true

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  database-migration:
    name: Supabase Migration Check
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Migrations
        run: |
          cd supabase
          supabase migration list --linked

      - name: Dry Run Migration
        run: |
          supabase db diff --schema public --use-migra

  deploy-preview:
    name: Deploy Preview to 4Everland
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to 4Everland Preview
        uses: 4everland/action-deploy@v1
        with:
          token: ${{ secrets.FOUR_EVERLAND_TOKEN }}
          project-id: ${{ env.FOUR_EVERLAND_PROJECT_ID }}
          dist: dist
          alias: pr-${{ github.event.number }}

  deploy-production:
    name: Deploy Production to 4Everland
    runs-on: ubuntu-latest
    needs: [lint-and-test, database-migration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to 4Everland Production
        uses: 4everland/action-deploy@v1
        with:
          token: ${{ secrets.FOUR_EVERLAND_TOKEN }}
          project-id: ${{ env.FOUR_EVERLAND_PROJECT_ID }}
          dist: dist
          alias: byrock.eth.limo

      - name: Notify Deployment
        run: |
          echo "✅ Deployed to https://byrock.eth.limo"
          echo "📋 Commit: ${{ github.sha }}"
          echo "📋 Branch: ${{ github.ref_name }}"